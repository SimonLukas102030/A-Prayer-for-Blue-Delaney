<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 9 — The Docks</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #06111e;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2.5rem 1rem 4rem;
            font-family: Georgia, 'Times New Roman', serif;
            cursor: pointer;
            user-select: none;
        }

        .scene {
            width: 100%;
            max-width: 680px;
        }

        /* ── ROPE ── */
        .rope {
            height: 12px;
            background: repeating-linear-gradient(
                90deg,
                #b8923a 0px, #8a6020 3px,
                #c8a840 7px, #a07830 10px,
                #b8923a 13px
            );
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }

        /* ── DOCK PANEL ── */
        .dock {
            background: repeating-linear-gradient(
                180deg,
                #2c1a0a 0px, #3a2210 36px,
                #1c0e06 36px, #1c0e06 38px
            );
            border-left: 8px solid #150b04;
            border-right: 8px solid #150b04;
            padding: 2rem 2.4rem 2.4rem;
        }

        /* ── HEADER ── */
        .header {
            text-align: center;
            padding-bottom: 1.2rem;
            margin-bottom: 1.8rem;
            border-bottom: 1px solid rgba(200,168,64,0.2);
        }

        .location {
            font-size: 0.66rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #c8a840;
            opacity: 0.7;
            font-family: 'Courier New', monospace;
        }

        .ch-title {
            font-size: 1.5rem;
            color: #e8d89a;
            margin-top: 0.35rem;
            font-weight: normal;
            letter-spacing: 0.04em;
        }

        /* ── CONVERSATION ── */
        .conversation {
            display: flex;
            flex-direction: column;
            gap: 1.4rem;
        }

        .line { animation: appear 0.3s ease forwards; }

        @keyframes appear {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Narrator — centered, italic */
        .narrator-block {
            text-align: center;
            padding: 0 1.2rem;
        }
        .narrator-text {
            font-style: italic;
            font-size: 0.87rem;
            color: #a08858;
            line-height: 1.7;
        }

        /* Dialogue — Bill left, Colm right */
        .dia-block {
            display: flex;
            flex-direction: column;
            max-width: 82%;
        }
        .dia-block.bill { align-self: flex-start; }
        .dia-block.colm { align-self: flex-end;   }

        .speaker-name {
            font-size: 0.58rem;
            letter-spacing: 0.26em;
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
            margin-bottom: 0.28rem;
        }
        .dia-block.bill .speaker-name { color: #d4903a; padding-left: 0.9rem; }
        .dia-block.colm .speaker-name { color: #5aace0; text-align: right; padding-right: 0.9rem; }

        .speech-bubble {
            padding: 0.6rem 0.9rem;
            font-size: 0.94rem;
            line-height: 1.68;
            border-radius: 3px;
        }
        .dia-block.bill .speech-bubble {
            background: rgba(200,136,42,0.09);
            border-left: 3px solid #c8882a;
            color: #f0e4c0;
        }
        .dia-block.colm .speech-bubble {
            background: rgba(62,143,192,0.09);
            border-right: 3px solid #3e8fc0;
            color: #d8f0ff;
        }

        /* ── CONTROLS ── */
        .click-prompt {
            text-align: center;
            color: #c8a840;
            font-size: 0.7rem;
            letter-spacing: 0.18em;
            margin-top: 2rem;
            font-family: 'Courier New', monospace;
            animation: blink 2.4s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50%       { opacity: 0.8; }
        }

        .end-card {
            text-align: center;
            color: #c8a840;
            font-size: 0.8rem;
            letter-spacing: 0.14em;
            margin-top: 2rem;
            font-family: 'Courier New', monospace;
            opacity: 0;
            transition: opacity 0.8s;
        }
        .end-card.show { opacity: 0.8; }
    </style>
</head>
<body>
<div class="scene">
    <div class="rope"></div>
    <div class="dock">
        <div class="header">
            <div class="location">Fremantle Docks &nbsp;·&nbsp; Western Australia &nbsp;·&nbsp; 1951</div>
            <div class="ch-title">The Fisherman</div>
        </div>

        <div class="conversation" id="conv"></div>

        <div class="click-prompt" id="prompt">— click to continue —</div>
        <div class="end-card" id="end">— End of Chapter 9 —</div>
    </div>
    <div class="rope"></div>
</div>

<script>
// who: 'narrator' | 'bill' | 'colm'
const lines = [
    { who: 'narrator', text: '[Opening scene: Colm arrives at the Fremantle docks. Describe what he sees and smells. He is looking for a ship back to England.]' },
    { who: 'narrator', text: '[He spots a dog sitting beside a fisherman and walks over. He sits down next to the dog.]' },
    { who: 'bill',     text: '[Bill asks whether the dog is bothering him.]' },
    { who: 'colm',     text: '[Colm says no.]' },
    { who: 'narrator', text: '[Bill gives him something to drink. He gets up to leave — but then sits down beside Colm instead.]' },
    { who: 'colm',     text: '[Colm says he wants to get back to England.]' },
    { who: 'bill',     text: '[Bill says he once tried to smuggle himself onto a ship too. Replace with what he actually says.]' },
    { who: 'narrator', text: '[Bill gives him tea and biscuits. Then he asks for Colm\'s name. Colm ignores the question.]' },
    { who: 'bill',     text: 'Well, I\'m Bill Dare. You can call me Bill.' },
    { who: 'narrator', text: '[Colm says he is from the Boys\' Home. He starts to leave, sure Bill will drag him back.]' },
    { who: 'bill',     text: '[Bill says he isn\'t taking him back anywhere. He just wants to help — and invites Colm to his house.]' },
    { who: 'narrator', text: '[Bill\'s house turns out to be an old asylum. He gives Colm food and bandages his foot.]' },
];

let idx = 0;
const conv   = document.getElementById('conv');
const prompt = document.getElementById('prompt');
const end    = document.getElementById('end');

function next() {
    if (idx >= lines.length) {
        prompt.style.display = 'none';
        end.classList.add('show');
        return;
    }
    const l = lines[idx++];
    const wrap = document.createElement('div');
    wrap.className = 'line';

    if (l.who === 'narrator') {
        const nb = document.createElement('div');
        nb.className = 'narrator-block';
        const nt = document.createElement('div');
        nt.className = 'narrator-text';
        nt.textContent = l.text;
        nb.appendChild(nt);
        wrap.appendChild(nb);
    } else {
        const db = document.createElement('div');
        db.className = `dia-block ${l.who}`;

        const sn = document.createElement('div');
        sn.className = 'speaker-name';
        sn.textContent = l.who === 'bill' ? 'Bill Dare' : 'Colm';

        const sb = document.createElement('div');
        sb.className = 'speech-bubble';
        sb.textContent = l.text;

        db.appendChild(sn);
        db.appendChild(sb);
        wrap.appendChild(db);
    }

    conv.appendChild(wrap);
    wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

document.addEventListener('click', next);
document.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); next(); }
});

next();
</script>
</body>
</html>
