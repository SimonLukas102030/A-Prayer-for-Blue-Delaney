<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 10 — The Piano</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #111008;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            padding: 2rem 1rem;
            font-family: Georgia, 'Times New Roman', serif;
        }

        /* ── TITLE ── */
        .ch-header {
            text-align: center;
        }

        .ch-header h1 {
            color: #e8d8a0;
            font-size: 1.3rem;
            font-weight: normal;
            letter-spacing: 0.08em;
        }

        .ch-header .sub {
            color: #806840;
            font-size: 0.72rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-top: 0.25rem;
        }

        /* ── MUSIC PAPER ── */
        .paper {
            background: #f5f0df;
            width: 100%;
            max-width: 680px;
            min-height: 200px;
            padding: 1.8rem 2.2rem 1.4rem;
            box-shadow: 0 6px 28px rgba(0,0,0,0.7);
            position: relative;
            overflow: hidden;
        }

        /* Staff lines */
        .paper::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                180deg,
                transparent 0px, transparent 34px,
                #90a8c0 34px, #90a8c0 35px
            );
            pointer-events: none;
        }

        .paper-label {
            font-size: 0.65rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: #788898;
            margin-bottom: 0.9rem;
            position: relative;
        }

        .word-area {
            position: relative;
            min-height: 110px;
            font-size: 1.04rem;
            color: #1a1a1e;
            line-height: 2.18;
            word-spacing: 0.15em;
        }

        .word {
            display: inline;
        }

        .word.flash-out {
            color: #cc2020;
            animation: wordOut 0.25s ease forwards;
        }

        @keyframes wordOut {
            to { opacity: 0; font-size: 0; }
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #2a2a3a;
            vertical-align: text-bottom;
            margin-left: 2px;
            animation: cursorBlink 1s step-end infinite;
        }

        @keyframes cursorBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .done-msg {
            text-align: center;
            color: #506878;
            font-size: 0.78rem;
            letter-spacing: 0.15em;
            margin-top: 0.6rem;
            position: relative;
            opacity: 0;
            transition: opacity 0.8s;
        }
        .done-msg.show { opacity: 1; }

        /* ── HINT + PROGRESS ── */
        .controls-info {
            text-align: center;
        }

        .hint {
            color: #c8a840;
            font-size: 0.78rem;
            letter-spacing: 0.1em;
        }

        .progress {
            color: #604820;
            font-size: 0.72rem;
            margin-top: 0.3rem;
            letter-spacing: 0.05em;
        }

        /* ── PIANO ── */
        .piano {
            position: relative;
            display: flex;
            gap: 3px;
            background: #0e0e0e;
            padding: 10px 14px 0;
            border-radius: 5px 5px 10px 10px;
            box-shadow:
                0 10px 36px rgba(0,0,0,0.9),
                inset 0 1px 0 rgba(255,255,255,0.08);
        }

        /* ── WHITE KEYS ── */
        .wk {
            width: 46px;
            height: 150px;
            background: linear-gradient(180deg, #f8f8f4 0%, #ddddd5 100%);
            border-radius: 0 0 6px 6px;
            border: 1px solid #bbb;
            border-top: none;
            position: relative;
            cursor: pointer;
            box-shadow: 0 5px 8px rgba(0,0,0,0.35);
            transition: background 0.06s;
            flex-shrink: 0;
        }

        .wk:hover { background: linear-gradient(180deg, #fff 0%, #eee 100%); }

        .wk.active {
            background: linear-gradient(180deg, #ffe84a 0%, #d4a800 100%);
            box-shadow: 0 5px 16px rgba(255,200,0,0.55);
        }

        .wk.pressed {
            transform: translateY(4px);
            box-shadow: 0 1px 4px rgba(0,0,0,0.35);
        }

        .wk.wrong {
            background: linear-gradient(180deg, #ff5050 0%, #bb1010 100%);
            transition: background 0s;
        }

        .key-lbl {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 0.6rem;
            color: #999;
            letter-spacing: 0.04em;
            pointer-events: none;
        }

        .wk.active .key-lbl { color: #7a5c00; font-weight: bold; }

        /* Arrow above active key */
        .key-arrow {
            position: absolute;
            top: -26px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            color: #ffe84a;
            display: none;
            pointer-events: none;
            animation: arrowBounce 0.9s ease-in-out infinite;
        }

        .wk.active .key-arrow { display: block; }

        @keyframes arrowBounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50%       { transform: translateX(-50%) translateY(-5px); }
        }

        /* ── BLACK KEYS ── */
        /* White key step = 46px wide + 3px gap = 49px per white key
           Piano left padding = 14px
           White key starts:
             C4 = 14
             D4 = 63
             E4 = 112
             F4 = 161
             G4 = 210
             A4 = 259
             B4 = 308
             C5 = 357
           Black key = 30px wide, centered at right edge of left white key:
             C# = 14 + 46 - 15 = 45
             D# = 63 + 46 - 15 = 94
             F# = 161 + 46 - 15 = 192
             G# = 210 + 46 - 15 = 241
             A# = 259 + 46 - 15 = 290  */
        .bk {
            width: 30px;
            height: 94px;
            background: linear-gradient(180deg, #2a2a2a 0%, #0a0a0a 100%);
            border-radius: 0 0 4px 4px;
            position: absolute;
            top: 10px;
            z-index: 2;
            pointer-events: none;
            box-shadow: 2px 5px 8px rgba(0,0,0,0.6);
        }

        /* ── WRONG FLASH ── */
        .screen-flash {
            position: fixed;
            inset: 0;
            background: rgba(200,0,0,0);
            pointer-events: none;
            z-index: 99;
            transition: background 0.3s ease;
        }

        .screen-flash.wrong {
            background: rgba(200,0,0,0.18);
            transition: background 0s;
        }
    </style>
</head>
<body>

<div class="ch-header">
    <h1>Chapter 10</h1>
    <div class="sub">— The Piano —</div>
</div>

<div class="paper">
    <div class="paper-label">Bill's House &nbsp;·&nbsp; Fremantle, W.A. &nbsp;·&nbsp; 1951</div>
    <div class="word-area" id="wordArea">
        <span class="cursor" id="cursor"></span>
    </div>
    <div class="done-msg" id="doneMsg">— Chapter 10 —</div>
</div>

<div class="controls-info">
    <div class="hint" id="hint">Press the glowing key to reveal the next word</div>
    <div class="progress" id="progress">0 / 0 words</div>
</div>

<div class="piano" id="piano">
    <!-- White keys -->
    <div class="wk" id="key-C4" data-note="C4">
        <div class="key-arrow">&#9660;</div>
        <div class="key-lbl">C</div>
    </div>
    <div class="wk" id="key-D4" data-note="D4">
        <div class="key-lbl">D</div>
    </div>
    <div class="wk" id="key-E4" data-note="E4">
        <div class="key-lbl">E</div>
    </div>
    <div class="wk" id="key-F4" data-note="F4">
        <div class="key-arrow">&#9660;</div>
        <div class="key-lbl">F</div>
    </div>
    <div class="wk" id="key-G4" data-note="G4">
        <div class="key-arrow">&#9660;</div>
        <div class="key-lbl">G</div>
    </div>
    <div class="wk" id="key-A4" data-note="A4">
        <div class="key-arrow">&#9660;</div>
        <div class="key-lbl">A</div>
    </div>
    <div class="wk" id="key-B4" data-note="B4">
        <div class="key-lbl">B</div>
    </div>
    <div class="wk" id="key-C5" data-note="C5">
        <div class="key-lbl">C</div>
    </div>

    <!-- Black keys (positioned absolutely, pointer-events: none) -->
    <div class="bk" style="left:45px;"></div>   <!-- C# -->
    <div class="bk" style="left:94px;"></div>   <!-- D# -->
    <div class="bk" style="left:192px;"></div>  <!-- F# -->
    <div class="bk" style="left:241px;"></div>  <!-- G# -->
    <div class="bk" style="left:290px;"></div>  <!-- A# -->
</div>

<div class="screen-flash" id="screenFlash"></div>

<script>
// ── YOUR TEXT HERE ──
// Replace this placeholder with your chapter 10 text.
// Each word will appear one by one as you press the piano keys.
const TEXT = "Replace this placeholder text with what you want to write about chapter ten. Write about Colm staying at Bill's house healing his foot. You can describe the old asylum how it looks and feels. Write about the weeks that passed and how Colm slowly felt better. Then describe how he found the piano and started learning it. Maybe write about how the music made him feel hopeful again for the first time. At the end mention the newspaper he read about the Queen visiting Fremantle the next day.";

// ── MELODY (C – G – Am – F, hopeful progression) ──
// Each step: which white key to press → which chord plays
const MELODY = [
    { key: 'C4', chord: 'C'  },
    { key: 'G4', chord: 'G'  },
    { key: 'A4', chord: 'Am' },
    { key: 'F4', chord: 'F'  },
];

// ── AUDIO ──
let audioCtx = null;

function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
}

const FREQ = {
    C3: 130.81, E3: 164.81, F3: 174.61, G3: 196.00, A3: 220.00, B3: 246.94,
    C4: 261.63, D4: 293.66, E4: 329.63, F4: 349.23, G4: 392.00, A4: 440.00, B4: 493.88,
    C5: 523.25, D5: 587.33, E5: 659.25
};

const CHORDS = {
    C:  { left: 'C3', right: ['C4', 'E4', 'G4'] },
    G:  { left: 'G3', right: ['G4', 'B4', 'D5'] },
    Am: { left: 'A3', right: ['A4', 'C5', 'E5'] },
    F:  { left: 'F3', right: ['F4', 'A4', 'C5'] },
};

function playNote(noteKey, startTime, duration, ctx, volume) {
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'triangle';
    osc.frequency.value = FREQ[noteKey];
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(volume, startTime + 0.018);
    gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
    osc.start(startTime);
    osc.stop(startTime + duration + 0.05);
}

function playChord(chordName) {
    const ctx  = getCtx();
    const now  = ctx.currentTime;
    const ch   = CHORDS[chordName];
    playNote(ch.left, now, 2.4, ctx, 0.22);            // bass (left hand)
    ch.right.forEach(n => playNote(n, now, 1.9, ctx, 0.14)); // treble (right hand)
}

// ── WORDS ──
const words = TEXT.trim().split(/\s+/);
let wordIdx   = 0;  // number of words currently shown
let melodyIdx = 0;  // position in melody (mod 4)

const wordArea = document.getElementById('wordArea');
const cursor   = document.getElementById('cursor');
const spans    = [];

function currentKey()   { return MELODY[melodyIdx % MELODY.length].key; }
function currentChord() { return MELODY[melodyIdx % MELODY.length].chord; }

function addWord() {
    if (wordIdx >= words.length) return;
    const span = document.createElement('span');
    span.className = 'word';
    span.textContent = words[wordIdx] + ' ';
    wordArea.insertBefore(span, cursor);
    spans.push(span);
    wordIdx++;
    melodyIdx++;
    updateHighlight();
    updateProgress();
}

function removeLastWord() {
    if (!spans.length) return;
    const last = spans.pop();
    last.classList.add('flash-out');
    setTimeout(() => last.remove(), 250);
    wordIdx--;
    updateProgress();
}

function updateHighlight() {
    document.querySelectorAll('.wk').forEach(k => k.classList.remove('active'));
    if (wordIdx < words.length) {
        const el = document.getElementById('key-' + currentKey());
        if (el) el.classList.add('active');
    } else {
        // All words shown — game complete
        cursor.style.display = 'none';
        document.getElementById('doneMsg').classList.add('show');
        document.getElementById('hint').style.display = 'none';
        document.getElementById('progress').textContent = 'Complete';
    }
}

function updateProgress() {
    document.getElementById('progress').textContent = `${wordIdx} / ${words.length} words`;
}

// ── KEY PRESS HANDLER ──
function handleKey(noteKey) {
    if (wordIdx >= words.length) return;

    const el = document.getElementById('key-' + noteKey);

    if (noteKey === currentKey()) {
        // Correct!
        playChord(currentChord());
        if (el) {
            el.classList.add('pressed');
            setTimeout(() => el.classList.remove('pressed'), 140);
        }
        addWord();
    } else {
        // Wrong!
        const flash = document.getElementById('screenFlash');
        flash.classList.remove('wrong');
        void flash.offsetWidth;
        flash.classList.add('wrong');
        setTimeout(() => flash.classList.remove('wrong'), 320);

        if (el) {
            el.classList.add('wrong');
            setTimeout(() => el.classList.remove('wrong'), 300);
        }

        removeLastWord();
    }
}

// Click on white keys
document.querySelectorAll('.wk').forEach(key => {
    key.addEventListener('click', e => {
        e.stopPropagation();
        handleKey(key.dataset.note);
    });
});

// Keyboard: a s d f g h j k → C4 D4 E4 F4 G4 A4 B4 C5
const KEY_MAP = {
    a: 'C4', s: 'D4', d: 'E4', f: 'F4',
    g: 'G4', h: 'A4', j: 'B4', k: 'C5',
};

document.addEventListener('keydown', e => {
    if (e.repeat || e.ctrlKey || e.metaKey) return;
    const note = KEY_MAP[e.key.toLowerCase()];
    if (note) { e.preventDefault(); handleKey(note); }
});

// Init
updateProgress();
updateHighlight();
</script>
</body>
</html>
